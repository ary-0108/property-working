<html lang="en">

<meta charset="UTF-8"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#07080D;}
#root{min-height:100%;}
input,select,textarea{font-family:'DM Mono',monospace;}
input[type=number]::-webkit-inner-spin-button{opacity:.15;}
input::placeholder,textarea::placeholder{color:#252C40;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#7A6228!important;}
button{cursor:pointer;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1C2133;border-radius:3px;}
input[type=range]{-webkit-appearance:none;appearance:none;height:2px;background:#252C40;border-radius:2px;outline:none;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#C9A84C;cursor:pointer;box-shadow:0 0 12px rgba(201,168,76,0.5);}
.fu{animation:fu .3s cubic-bezier(.4,0,.2,1) both;}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.chvr:hover{border-color:#7A6228!important;background:rgba(201,168,76,0.04)!important;}
.rmbtn:hover{opacity:1!important;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.modal-box{background:#0F1219;border:1px solid #C9A84C;border-radius:14px;width:100%;max-width:640px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;}
textarea.prompt-box{background:#07080D;border:none;color:#A0A8C0;font-family:'DM Mono',monospace;font-size:11px;line-height:1.7;padding:20px;flex:1;resize:none;min-height:240px;}
textarea.prompt-box:focus{outline:none;}
select option{background:#0F1219;color:#EDE8DC;}
</style>
</head>

const C={bg:'#07080D',surface:'#0F1219',elevated:'#151923',border:'#1C2133',gold:'#C9A84C',goldLight:'#E0BA6A',goldDim:'#7A6228',text:'#EDE8DC',muted:'#626880',dim:'#252C40',input:'#0B0D14',red:'#E05555',green:'#4A9E6E'};
const font={display:"'Cormorant Garamond',serif",mono:"'DM Mono',monospace",ui:"'Syne',sans-serif"};
const fmtINR=n=>{const v=parseFloat(n);if(!n||isNaN(v)||v===0)return'—';return'₹ '+v.toLocaleString('en-IN',{maximumFractionDigits:0});};
const crLabel=n=>{const v=parseFloat(n);if(!n||isNaN(v)||v===0)return'';if(v>=10000000)return`${(v/10000000).toFixed(2)} Cr`;if(v>=100000)return`${(v/100000).toFixed(2)} L`;return'';};
const inp=(x={})=>({background:C.input,border:`1px solid ${C.border}`,borderRadius:7,color:C.text,padding:'11px 14px',width:'100%',fontFamily:font.mono,fontSize:13,transition:'border-color 0.2s',...x});
const lbl={display:'block',color:C.muted,fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',fontFamily:font.ui,fontWeight:600,marginBottom:7};

function SHead({title,sub}){return <div style={{marginBottom:24}}><div style={{fontFamily:font.display,fontSize:26,fontWeight:500,color:C.text,letterSpacing:'-0.01em',lineHeight:1.1}}>{title}</div>{sub&&<div style={{fontFamily:font.mono,fontSize:11,color:C.muted,marginTop:5}}>{sub}</div>}</div>;}

function TotalBar({label,value,sub}){return <div style={{background:'rgba(201,168,76,0.06)',border:`1px solid ${C.gold}`,borderRadius:10,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}><div><div style={{fontFamily:font.ui,fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600}}>{label}</div><div style={{fontFamily:font.display,fontSize:24,color:C.gold,marginTop:2}}>{fmtINR(value)}</div>{sub&&<div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginTop:1}}>{sub}</div>}</div>{crLabel(value)&&<div style={{fontFamily:font.mono,fontSize:12,color:C.goldDim}}>{crLabel(value)}</div>}</div>;}

function Notes({value,onChange}){const[o,sO]=useState(false);return <div style={{marginTop:14}}><button onClick={()=>sO(!o)} style={{background:'none',border:`1px dashed ${C.border}`,borderRadius:6,color:C.muted,padding:'5px 12px',fontFamily:font.mono,fontSize:9,letterSpacing:'0.06em',display:'flex',alignItems:'center',gap:5}}>📝 Notes {o?'▲':'▾'}</button>{o&&<textarea value={value} onChange={e=>onChange(e.target.value)} style={{...inp({fontSize:12,padding:'9px 12px',marginTop:7,resize:'vertical',minHeight:60}),width:'100%'}} placeholder="Any one-off instructions for this section…"/>}</div>;}

function SaleOpt({value,onChange}){const opts=[{k:'duringConstruction',l:'⚡ During Const.'},{k:'atCompletion',l:'✓ At Completion'},{k:'lease',l:'🏢 Lease'}];return <div style={{display:'flex',background:C.dim,borderRadius:6,padding:2,marginTop:6}}>{opts.map(o=><button key={o.k} onClick={()=>onChange(o.k)} style={{flex:1,background:value===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:value===o.k?C.gold:C.muted,padding:'4px 3px',fontFamily:font.mono,fontSize:8,cursor:'pointer',transition:'all .15s'}}>{o.l}</button>)}</div>;}

function RateToggle({value,onChange}){return <div style={{display:'flex',background:C.dim,borderRadius:6,padding:2,marginBottom:7}}>{[{k:'sale',l:'Sale Rate'},{k:'rental',l:'Rental Rate'}].map(o=><button key={o.k} onClick={()=>onChange(o.k)} style={{flex:1,background:value===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:value===o.k?C.gold:C.muted,padding:'5px 8px',fontFamily:font.mono,fontSize:10,cursor:'pointer',transition:'all .15s'}}>{o.l}</button>)}</div>;}

function PromptModal({prompt,onClose}){const[cp,sC]=useState(false);const copy=()=>{navigator.clipboard.writeText(prompt).then(()=>{sC(true);setTimeout(()=>sC(false),2500);});};return <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}><div className="modal-box"><div style={{padding:'18px 20px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontFamily:font.display,fontSize:20,color:C.text,fontWeight:500}}>Input Summary Ready</div><div style={{fontFamily:font.mono,fontSize:10,color:C.muted,marginTop:3}}>Copy → Paste into Claude → Review in chat → Say "build the Excel"</div></div><button onClick={onClose} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,padding:'5px 11px',fontFamily:font.mono,fontSize:11}}>✕</button></div><textarea className="prompt-box" readOnly value={prompt}/><div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:10}}><button onClick={copy} style={{flex:1,background:cp?'rgba(74,158,110,0.12)':'rgba(201,168,76,0.10)',border:`1px solid ${cp?C.green:C.gold}`,borderRadius:8,padding:'12px',fontFamily:font.display,fontSize:17,fontWeight:500,color:cp?C.green:C.gold,transition:'all .2s'}}>{cp?'✓ Copied!':'Copy Prompt'}</button></div></div></div>;}

function App(){
  const[step,setStep]=useState(0);
  const[modal,setModal]=useState(false);
  const[prompt,setPrompt]=useState('');
  const[form,setForm]=useState({
    mode:'outright',
    projectName:'Chintal Commercial',location:'Hyderabad',
    plotArea:'',plotUnit:'sqyds',roadWidth:'',surveyNo:'',locationPin:'',
    loadingFactor:1.35,
    floors:[
      {id:1,label:'Ground Floor',floorNo:'G',carpet:'21877',rateType:'rental',saleRate:'',rentalRate:'100',saleOption:'atCompletion',priority:false,split:false,units:[],notes:''},
      {id:2,label:'First Floor',floorNo:'1',carpet:'21877',rateType:'rental',saleRate:'',rentalRate:'100',saleOption:'atCompletion',priority:false,split:false,units:[],notes:''},
      {id:3,label:'Floor 2',floorNo:'2',carpet:'21877',rateType:'rental',saleRate:'',rentalRate:'50',saleOption:'atCompletion',priority:false,split:false,units:[],notes:''},
      {id:4,label:'Floor 3',floorNo:'3',carpet:'21877',rateType:'rental',saleRate:'',rentalRate:'50',saleOption:'atCompletion',priority:false,split:false,units:[],notes:''},
      {id:5,label:'Floor 4',floorNo:'4',carpet:'21877',rateType:'rental',saleRate:'',rentalRate:'50',saleOption:'atCompletion',priority:false,split:false,units:[],notes:''},
    ],
    floorNotes:'',
    land:{acq:'650000000',stamp:'0',brok:'6500000',goodwill:'0',payment:'upfront',owned:false,notes:''},
    constr:{
      comps:[
        {id:1,name:'Commercial Floors',area:'109385',rate:'2500',type:'commercial'},
        {id:2,name:'Cellar / Basement',area:'80000',rate:'1200',type:'basement'},
      ],
      softType:'pct',softVal:'0',contingency:'0',marketing:'0',notes:''
    },
    interest:{cRate:'12',cTenure:'2',lRate:'12',lTenure:'2',method:'simple',presale:false,notes:''},
    rateMode:'global',
    rates:{premium:'20000',rental:'70',cap:'200',stRate:'',stType:'perSqft',notes:''},
    exits:{during:true,premium:true,leaseUnit:true,leaseSingle:false},
    deal:{structure:'investorBuysLand',equityType:'external',spv:'',invPct:55,invName:'',notes:''},
    reviewNotes:'',
  });

  const set=(path,val)=>setForm(prev=>{const n=JSON.parse(JSON.stringify(prev));const k=path.split('.');let o=n;for(let i=0;i<k.length-1;i++)o=o[k[i]];o[k[k.length-1]]=val;return n;});

  const visSteps=form.mode==='outright'?[1,2,3,4,5,6,7,9]:[1,2,3,4,5,6,7,8,9];
  const stepLabels={1:'Mode',2:'Basics',3:'Floors',4:'Land',5:'Build',6:'Interest',7:'Exits',8:'Split',9:'Review'};
  const goNext=()=>{const i=visSteps.indexOf(step);if(i<visSteps.length-1)setStep(visSteps[i+1]);else generate();};
  const goPrev=()=>{const i=visSteps.indexOf(step);if(i>0)setStep(visSteps[i-1]);else setStep(0);};

  const tSBA=form.floors.reduce((a,f)=>a+(+f.carpet||0)*form.loadingFactor,0);
  const tLand=(+form.land.acq||0)+(+form.land.stamp||0)+(+form.land.brok||0)+(+form.land.goodwill||0);
  const baseConstr=form.constr.comps.reduce((a,c)=>a+(+c.area||0)*(+c.rate||0),0);
  const softAmt=form.constr.softType==='pct'?baseConstr*(+form.constr.softVal||0)/100:(+form.constr.softVal||0);
  const contAmt=baseConstr*(+form.constr.contingency||0)/100;
  const tConstr=baseConstr+softAmt+contAmt;

  const generate=()=>{
    let p=`PROJECT INPUT — ${form.projectName}, ${form.location}\n${'─'.repeat(54)}\n`;
    p+=`Model        : ${form.mode==='outright'?'Outright Purchase':form.mode==='both'?'Both Models':'Development'}\n`;
    p+=`Loading      : ${form.loadingFactor}x\n`;
    if(form.plotArea)p+=`Plot Area    : ${Number(form.plotArea).toLocaleString('en-IN')} ${form.plotUnit==='sqyds'?'Sq.Yds':'sqft'}\n`;
    if(form.roadWidth)p+=`Road Width   : ${form.roadWidth}m → Apply GO Ms. No. 168 Table-III for setbacks & permissible height\n`;
    if(form.surveyNo)p+=`Survey No    : ${form.surveyNo}\n`;
    if(form.locationPin)p+=`Location Pin : ${form.locationPin}\n`;
    p+=`\nFLOOR SCHEDULE:\n`;
    form.floors.forEach(f=>{
      const sba=Math.round((+f.carpet||0)*form.loadingFactor);
      if(f.split&&f.units.length>0){
        const uSum=f.units.reduce((a,u)=>a+(+u.carpet||0),0);
        const rem=(+f.carpet||0)-uSum;
        p+=`${f.label} (${f.floorNo}) — split into units:\n`;
        f.units.forEach(u=>{
          const uSBA=Math.round((+u.carpet||0)*form.loadingFactor);
          const rs=u.rateType==='rental'?`₹${u.rentalRate}/sqft/month rental`:`₹${Number(u.saleRate).toLocaleString('en-IN')}/sqft SBA`;
          const ss=u.saleOpt==='duringConstruction'?' [SELL DURING CONSTRUCTION]':u.saleOpt==='lease'?' [LEASE]':' [AT COMPLETION]';
          p+=`  ${u.priority?'⭐ ':''}${u.name}: ${u.carpet} sqft carpet / ${uSBA} sqft SBA @ ${rs}${ss}${u.priority?' ⭐ PRIORITY':''}\n`;
        });
        if(rem>0){const rs=f.rateType==='rental'?`₹${f.rentalRate}/sqft/month rental`:`₹${Number(f.saleRate).toLocaleString('en-IN')}/sqft SBA`;p+=`  Remaining: ${rem} sqft carpet @ ${rs} [inherits floor settings]\n`;}
      }else{
        const rs=f.rateType==='rental'?`@ ₹${f.rentalRate}/sqft/month rental`:`@ ₹${Number(f.saleRate).toLocaleString('en-IN')}/sqft SBA`;
        const ss=f.saleOption==='duringConstruction'?' [SELL DURING CONSTRUCTION]':f.saleOption==='lease'?' [LEASE]':' [AT COMPLETION]';
        p+=`  ${f.priority?'⭐ ':''}${f.label} (${f.floorNo}): Carpet ${f.carpet} sqft / SBA ${sba} sqft ${rs}${ss}${f.priority?' ⭐ PRIORITY':''}\n`;
      }
      if(f.notes)p+=`  ⚠️ Note: ${f.notes}\n`;
    });
    if(form.floorNotes)p+=`⚠️ Floor Notes: ${form.floorNotes}\n`;
    p+=`  Total SBA: ${Math.round(tSBA).toLocaleString('en-IN')} sqft\n`;
    p+=`\nLAND COST:\n`;
    p+=`  Acquisition     : ${fmtINR(form.land.acq)}\n  Stamp Duty & Reg: ${fmtINR(form.land.stamp)}\n  Brokerage       : ${fmtINR(form.land.brok)}\n`;
    if(+form.land.goodwill>0)p+=`  Goodwill / NTC  : ${fmtINR(form.land.goodwill)}\n`;
    p+=`  Total           : ${fmtINR(tLand)}\n`;
    if(form.land.owned)p+=`  ⚠️ Land already owned\n`;
    if(form.land.notes)p+=`  ⚠️ Note: ${form.land.notes}\n`;
    p+=`\nCONSTRUCTION:\n`;
    form.constr.comps.forEach(c=>p+=`  ${c.name} [${c.type}]: ${Number(c.area).toLocaleString('en-IN')} sqft @ ₹${Number(c.rate).toLocaleString('en-IN')}/sqft = ${fmtINR((+c.area||0)*(+c.rate||0))}\n`);
    if(+form.constr.softVal>0)p+=`  Soft Costs: ${form.constr.softType==='pct'?form.constr.softVal+'% of construction':fmtINR(form.constr.softVal)} = ${fmtINR(softAmt)}\n`;
    if(+form.constr.contingency>0)p+=`  Contingency: ${form.constr.contingency}% = ${fmtINR(contAmt)}\n`;
    if(+form.constr.marketing>0)p+=`  Marketing/Brokerage: ${form.constr.marketing}% of revenue (apply at P&L level)\n`;
    p+=`  Total Construction: ${fmtINR(tConstr)}\n`;
    if(form.constr.notes)p+=`  ⚠️ Note: ${form.constr.notes}\n`;
    p+=`\nINTEREST:\n  Construction: ${form.interest.cRate}% p.a. × ${form.interest.cTenure} yr (${form.interest.method})\n  Land        : ${form.interest.lRate}% p.a. × ${form.interest.lTenure} yr (${form.interest.method})\n`;
    if(form.interest.presale)p+=`  Pre-sale offset: Yes — apply ⭐ priority unit inflows to reduce construction interest base\n`;
    if(form.interest.notes)p+=`  ⚠️ Note: ${form.interest.notes}\n`;
    p+=`\nSALE RATES & EXITS:\n  Rate Mode: ${form.rateMode==='global'?'Global':'Per Floor/Unit (from Floor Schedule)'}\n`;
    if(form.rateMode==='global'){
      if(form.rates.premium)p+=`  Premium Rate  : ₹${Number(form.rates.premium).toLocaleString('en-IN')}/sqft SBA\n`;
      if(form.rates.rental)p+=`  Monthly Rental: ₹${form.rates.rental}/sqft/month → Cap (×${form.rates.cap}) = ₹${(form.rates.rental*form.rates.cap).toLocaleString('en-IN')}/sqft\n`;
    }
    if(form.exits.leaseSingle&&form.rates.stRate)p+=`  Single Tenant : ₹${form.rates.stRate}/${form.rates.stType==='perSqft'?'sqft/month':'month total'} → Cap (×${form.rates.cap})\n`;
    const el=[];
    if(form.exits.during)el.push('⚡ Sell During Construction (= base sale price — no interest)');
    if(form.exits.premium)el.push('🏆 Outright Sale @ Premium');
    if(form.exits.leaseUnit)el.push('🏢 Lease / Rental Yield — Per Floor/Unit');
    if(form.exits.leaseSingle)el.push('🏢 Lease — Single Tenant (whole project)');
    el.forEach(e=>p+=`  ✓ ${e}\n`);
    if(form.rates.notes)p+=`  ⚠️ Note: ${form.rates.notes}\n`;
    if(form.mode!=='outright'){
      p+=`\nDEAL SPLIT:\n  Structure: ${form.deal.structure==='investorBuysLand'?'Investor Buys Land':form.deal.structure==='jda'?'JDA':'Pure Equity'}\n`;
      if(form.deal.structure==='pureEquity')p+=`  Equity: ${form.deal.equityType==='internal'?'Internal / My Company (self-funded — treat as Outright)':'External Investor'}\n`;
      if(form.deal.equityType!=='internal'){p+=`  Investor: ${form.deal.invPct}% | Developer: ${100-form.deal.invPct}%\n`;if(form.deal.invName)p+=`  Investor Name: ${form.deal.invName}\n`;}
      if(form.deal.notes)p+=`  ⚠️ Note: ${form.deal.notes}\n`;
    }
    if(form.reviewNotes)p+=`\n⚠️ ADDITIONAL NOTES:\n${form.reviewNotes}\n`;
    p+=`\n${'─'.repeat(54)}\nPlease run the full feasibility analysis in chat first.\nShow: floor schedule → cost stack → P&L (all exits) → investor deal → sensitivity → lease yield.\nI will say "build the Excel" when ready.`;
    setPrompt(p);setModal(true);
  };

  const visL=visSteps.filter(s=>s<9).map(s=>stepLabels[s]);
  const dIdx=visSteps.indexOf(step);
  const dTot=visSteps.filter(s=>s<9).length;

  // ── STEP RENDERS ──────────────────────────────────────────────────────────

  const stepRender=()=>{
    if(step===0)return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'80vh',padding:'40px 22px',textAlign:'center'}}>
        <div style={{background:'white',borderRadius:12,padding:'14px 18px',marginBottom:28,display:'inline-block'}}>
          <img src={`data:image/jpeg;base64,${LOGO_B64}`} alt="Amol Developers" style={{height:40,width:'auto',display:'block'}}/>
        </div>
        <div style={{fontFamily:font.display,fontSize:36,color:C.text,fontWeight:500,lineHeight:1.1,marginBottom:10}}>Property Working</div>
        <div style={{fontFamily:font.mono,fontSize:11,color:C.muted,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:40}}>Feasibility Builder · Amol Developers</div>
        <button onClick={()=>setStep(1)} style={{background:`rgba(201,168,76,0.10)`,border:`1px solid ${C.gold}`,borderRadius:10,color:C.gold,padding:'16px 48px',fontFamily:font.display,fontSize:22,fontWeight:500,letterSpacing:'-0.01em',transition:'all .2s'}}>Begin →</button>
      </div>
    );

    if(step===1)return(
      <div className="fu" key={1}>
        <SHead title="Model Type" sub="What kind of deal is this?"/>
        {[{k:'development',l:'Development',d:'Investor funds land · Developer builds · Revenue split'},{k:'outright',l:'Outright Purchase',d:'Developer buys land · Developer builds · Full P&L'},{k:'both',l:'Both Models',d:'Run Development and Outright side by side'}].map(o=>(
          <div key={o.k} className="chvr" onClick={()=>set('mode',o.k)} style={{border:`1.5px solid ${form.mode===o.k?C.gold:C.border}`,borderRadius:10,padding:'16px 18px',marginBottom:10,cursor:'pointer',background:form.mode===o.k?'rgba(201,168,76,0.06)':'transparent',transition:'all .15s'}}>
            <div style={{fontFamily:font.display,fontSize:20,color:form.mode===o.k?C.gold:C.text,fontWeight:500}}>{o.l}</div>
            <div style={{fontFamily:font.mono,fontSize:11,color:C.muted,marginTop:4}}>{o.d}</div>
          </div>
        ))}
        <button onClick={()=>setStep(visSteps[1])} disabled={!form.mode} style={{marginTop:20,width:'100%',background:form.mode?`rgba(201,168,76,0.10)`:'transparent',border:`1px solid ${form.mode?C.gold:C.border}`,borderRadius:9,color:form.mode?C.gold:C.muted,padding:'13px',fontFamily:font.display,fontSize:19,fontWeight:500,transition:'all .2s'}}>Continue →</button>
      </div>
    );

    if(step===2)return(
      <div className="fu" key={2}>
        <SHead title="Project Basics" sub="Name, location and site details"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div><label style={lbl}>Project Name *</label><input style={inp()} value={form.projectName} onChange={e=>set('projectName',e.target.value)} placeholder="e.g. Chintal Commercial"/></div>
          <div><label style={lbl}>Location *</label><input style={inp()} value={form.location} onChange={e=>set('location',e.target.value)} placeholder="e.g. Hyderabad"/></div>
          <div><label style={lbl}>Loading Factor</label><input style={inp()} type="number" step="0.01" value={form.loadingFactor} onChange={e=>set('loadingFactor',parseFloat(e.target.value)||1.40)}/></div>
          <div>
            <label style={lbl}>Model</label>
            <div style={{background:C.dim,borderRadius:7,padding:3,display:'flex'}}>
              {['development','outright','both'].map(m=><button key={m} onClick={()=>set('mode',m)} style={{flex:1,background:form.mode===m?C.surface:'transparent',border:'none',borderRadius:5,color:form.mode===m?C.gold:C.muted,padding:'8px 4px',fontFamily:font.mono,fontSize:9,cursor:'pointer',textTransform:'capitalize'}}>{m}</button>)}
            </div>
          </div>
        </div>
        <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',marginBottom:12}}>
          <div style={{fontFamily:font.ui,fontSize:10,color:C.gold,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600,marginBottom:12}}>📐 Plot & Site Data</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div>
              <label style={lbl}>Plot Area</label>
              <div style={{display:'flex',gap:6}}>
                <input style={inp({flex:1})} type="number" value={form.plotArea} onChange={e=>set('plotArea',e.target.value)} placeholder="e.g. 4860"/>
                <select value={form.plotUnit} onChange={e=>set('plotUnit',e.target.value)} style={{...inp({width:'auto',padding:'11px 10px'})}}>
                  <option value="sqyds">Sq.Yds</option><option value="sqft">Sq.Ft</option>
                </select>
              </div>
            </div>
            <div><label style={lbl}>Road Width (m)</label><input style={inp()} type="number" value={form.roadWidth} onChange={e=>set('roadWidth',e.target.value)} placeholder="e.g. 9"/></div>
          </div>
          <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginBottom:10}}>No PDF? Enter manually:</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={lbl}>Survey Number</label><input style={inp()} value={form.surveyNo} onChange={e=>set('surveyNo',e.target.value)} placeholder="e.g. 143/2"/></div>
            <div><label style={lbl}>Location Pin</label><input style={inp()} value={form.locationPin} onChange={e=>set('locationPin',e.target.value)} placeholder="maps.google.com/?q=…"/></div>
          </div>
          {(form.roadWidth||form.surveyNo)&&<div style={{marginTop:10,fontFamily:font.mono,fontSize:9,color:C.goldDim}}>→ Claude will apply GO Ms. No. 168 / TG-bPASS to derive setbacks, coverage & permissible height</div>}
        </div>
      </div>
    );

    if(step===3){
      const updateFloor=(i,k,v)=>{const f=[...form.floors];f[i]={...f[i],[k]:v};set('floors',f);};
      const addUnit=(fi)=>{const f=JSON.parse(JSON.stringify(form.floors));f[fi].units=[...f[fi].units,{id:Date.now(),name:'Shop '+( f[fi].units.length+1),carpet:'',rateType:'sale',saleRate:'',rentalRate:'',saleOpt:'atCompletion',priority:false}];set('floors',f);};
      const updateUnit=(fi,ui,k,v)=>{const f=JSON.parse(JSON.stringify(form.floors));f[fi].units[ui]={...f[fi].units[ui],[k]:v};set('floors',f);};
      const removeUnit=(fi,ui)=>{const f=JSON.parse(JSON.stringify(form.floors));f[fi].units=f[fi].units.filter((_,i)=>i!==ui);set('floors',f);};
      return(
        <div className="fu" key={3}>
          <SHead title="Floor Schedule" sub="Set rates per floor — split into shops if needed"/>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}}>
            {form.floors.map((fl,fi)=>{
              const sba=Math.round((+fl.carpet||0)*form.loadingFactor);
              const uSum=fl.units.reduce((a,u)=>a+(+u.carpet||0),0);
              const rem=(+fl.carpet||0)-uSum;
              return(
                <div key={fl.id} style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                    <input style={{...inp({padding:'6px 10px',flex:1,fontSize:12})}} value={fl.label} onChange={e=>updateFloor(fi,'label',e.target.value)} placeholder="Floor label"/>
                    <input style={{...inp({padding:'6px 8px',width:50,fontSize:11,textAlign:'center'})}} value={fl.floorNo} onChange={e=>updateFloor(fi,'floorNo',e.target.value)} placeholder="G/1/2"/>
                    {form.floors.length>1&&<button className="rmbtn" onClick={()=>set('floors',form.floors.filter((_,i)=>i!==fi))} style={{background:'none',border:'none',color:C.red,fontSize:14,opacity:.4,transition:'opacity .15s'}}>✕</button>}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:8}}>
                    <div><label style={lbl}>Carpet Area (sqft)</label><input style={inp()} type="number" value={fl.carpet} onChange={e=>updateFloor(fi,'carpet',e.target.value)} placeholder="e.g. 5000"/></div>
                    <div>
                      <RateToggle value={fl.rateType} onChange={v=>updateFloor(fi,'rateType',v)}/>
                      {fl.rateType==='sale'
                        ?<input style={inp()} type="number" value={fl.saleRate} onChange={e=>updateFloor(fi,'saleRate',e.target.value)} placeholder="₹/sqft SBA"/>
                        :<input style={inp()} type="number" value={fl.rentalRate} onChange={e=>updateFloor(fi,'rentalRate',e.target.value)} placeholder="₹/sqft/month"/>
                      }
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                    <div style={{flex:1}}><label style={{...lbl,marginBottom:4}}>Sale Option</label><SaleOpt value={fl.saleOption} onChange={v=>updateFloor(fi,'saleOption',v)}/></div>
                    <div style={{marginTop:14}}>
                      <button onClick={()=>updateFloor(fi,'priority',!fl.priority)} style={{background:fl.priority?'rgba(201,168,76,0.12)':'none',border:`1px solid ${fl.priority?C.gold:C.border}`,borderRadius:6,color:fl.priority?C.gold:C.muted,padding:'5px 10px',fontFamily:font.mono,fontSize:10,whiteSpace:'nowrap'}}>⭐ {fl.priority?'Priority':'Standard'}</button>
                    </div>
                  </div>
                  {sba>0&&!fl.split&&<div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginBottom:6}}>SBA: {sba.toLocaleString('en-IN')} sqft {fl.rateType==='sale'&&fl.saleRate?`· Rev: ${fmtINR(sba*(+fl.saleRate||0))}`:fl.rateType==='rental'&&fl.rentalRate?`· Monthly: ${fmtINR(sba*(+fl.rentalRate||0))} · Cap×200: ${fmtINR(sba*(+fl.rentalRate||0)*200)}`:''}</div>}
                  <button onClick={()=>updateFloor(fi,'split',!fl.split)} style={{background:'none',border:`1px dashed ${fl.split?C.goldDim:C.border}`,borderRadius:6,color:fl.split?C.gold:C.muted,padding:'5px 12px',fontFamily:font.mono,fontSize:9,width:'100%',marginBottom:fl.split?10:0}}>
                    {fl.split?'▲ Collapse Units':'▾ Split into Shops / Units'}
                  </button>
                  {fl.split&&(
                    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10}}>
                      {fl.units.map((u,ui)=>(
                        <div key={u.id} style={{background:C.surface,borderRadius:8,padding:'10px 12px',marginBottom:8}}>
                          <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center'}}>
                            <input style={{...inp({padding:'5px 9px',flex:1,fontSize:11})}} value={u.name} onChange={e=>updateUnit(fi,ui,'name',e.target.value)} placeholder="Unit name"/>
                            <button className="rmbtn" onClick={()=>removeUnit(fi,ui)} style={{background:'none',border:'none',color:C.red,fontSize:13,opacity:.4,transition:'opacity .15s'}}>✕</button>
                          </div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:6}}>
                            <div><label style={lbl}>Carpet (sqft)</label><input style={inp()} type="number" value={u.carpet} onChange={e=>updateUnit(fi,ui,'carpet',e.target.value)} placeholder="sqft"/></div>
                            <div>
                              <RateToggle value={u.rateType} onChange={v=>updateUnit(fi,ui,'rateType',v)}/>
                              {u.rateType==='sale'
                                ?<input style={inp()} type="number" value={u.saleRate} onChange={e=>updateUnit(fi,ui,'saleRate',e.target.value)} placeholder="₹/sqft SBA"/>
                                :<input style={inp()} type="number" value={u.rentalRate} onChange={e=>updateUnit(fi,ui,'rentalRate',e.target.value)} placeholder="₹/sqft/month"/>
                              }
                            </div>
                          </div>
                          <div style={{display:'flex',gap:6,alignItems:'center'}}>
                            <div style={{flex:1}}><SaleOpt value={u.saleOpt} onChange={v=>updateUnit(fi,ui,'saleOpt',v)}/></div>
                            <button onClick={()=>updateUnit(fi,ui,'priority',!u.priority)} style={{background:u.priority?'rgba(201,168,76,0.12)':'none',border:`1px solid ${u.priority?C.gold:C.border}`,borderRadius:5,color:u.priority?C.gold:C.muted,padding:'4px 8px',fontFamily:font.mono,fontSize:9,whiteSpace:'nowrap'}}>⭐{u.priority?' First':''}</button>
                          </div>
                        </div>
                      ))}
                      {rem>0&&fl.units.length>0&&<div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginBottom:8,padding:'6px 10px',background:C.surface,borderRadius:6}}>Remaining: {rem.toLocaleString('en-IN')} sqft → inherits floor-level settings</div>}
                      <button onClick={()=>addUnit(fi)} style={{background:'none',border:`1px dashed ${C.goldDim}`,borderRadius:7,color:C.gold,padding:'8px',fontFamily:font.mono,fontSize:11,width:'100%'}}>+ Add Unit / Shop</button>
                    </div>
                  )}
                  <Notes value={fl.notes} onChange={v=>updateFloor(fi,'notes',v)}/>
                </div>
              );
            })}
          </div>
          <button onClick={()=>set('floors',[...form.floors,{id:Date.now(),label:`Floor ${form.floors.length}`,floorNo:`${form.floors.length}`,carpet:'',rateType:'sale',saleRate:'',rentalRate:'',saleOption:'atCompletion',priority:false,split:false,units:[],notes:''}])} style={{background:'none',border:`1px dashed ${C.goldDim}`,borderRadius:8,color:C.gold,padding:'10px',fontFamily:font.mono,fontSize:11,width:'100%',marginBottom:12}}>+ Add Floor</button>
          {tSBA>0&&<TotalBar label="Total SBA" value={tSBA} sub={`${Math.round(tSBA).toLocaleString('en-IN')} sqft across ${form.floors.length} floors`}/>}
          <Notes value={form.floorNotes} onChange={v=>set('floorNotes',v)}/>
        </div>
      );
    }

    if(step===4)return(
      <div className="fu" key={4}>
        <SHead title="Land Cost" sub="Investor capital outlay"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div style={{gridColumn:'1/-1'}}><label style={lbl}>Acquisition (₹) *</label><input style={inp()} type="number" value={form.land.acq} onChange={e=>set('land.acq',e.target.value)} placeholder="e.g. 25000000"/>{form.land.acq&&<div style={{fontFamily:font.mono,fontSize:10,color:C.goldDim,marginTop:4}}>{crLabel(form.land.acq)}</div>}</div>
          <div><label style={lbl}>Stamp Duty & Reg (₹)</label><input style={inp()} type="number" value={form.land.stamp} onChange={e=>set('land.stamp',e.target.value)} placeholder="0"/></div>
          <div><label style={lbl}>Brokerage (₹)</label><input style={inp()} type="number" value={form.land.brok} onChange={e=>set('land.brok',e.target.value)} placeholder="0"/></div>
          <div><label style={lbl}>Goodwill / NTC (₹)</label><input style={inp()} type="number" value={form.land.goodwill} onChange={e=>set('land.goodwill',e.target.value)} placeholder="0 if none"/></div>
          <div>
            <label style={lbl}>Payment Structure</label>
            <div style={{display:'flex',background:C.dim,borderRadius:6,padding:2}}>
              {[{k:'upfront',l:'Fully Upfront'},{k:'staggered',l:'Staggered'}].map(o=><button key={o.k} onClick={()=>set('land.payment',o.k)} style={{flex:1,background:form.land.payment===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:form.land.payment===o.k?C.gold:C.muted,padding:'6px',fontFamily:font.mono,fontSize:9,cursor:'pointer'}}>{o.l}</button>)}
            </div>
          </div>
        </div>
        <div onClick={()=>set('land.owned',!form.land.owned)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',border:`1px solid ${form.land.owned?C.gold:C.border}`,borderRadius:8,cursor:'pointer',background:form.land.owned?'rgba(201,168,76,0.06)':'transparent',marginBottom:4}}>
          <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${form.land.owned?C.gold:C.border}`,background:form.land.owned?C.gold:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.bg,flexShrink:0}}>{form.land.owned&&'✓'}</div>
          <div><div style={{fontFamily:font.ui,fontSize:12,color:form.land.owned?C.gold:C.text,fontWeight:500}}>Land Already Owned</div><div style={{fontFamily:font.mono,fontSize:9,color:C.muted}}>Acquisition = ₹0 · Only stamp/brokerage apply</div></div>
        </div>
        {tLand>0&&<TotalBar label="Total Land Cost" value={tLand}/>}
        <Notes value={form.land.notes} onChange={v=>set('land.notes',v)}/>
      </div>
    );

    if(step===5){
      const updateComp=(i,k,v)=>{const c=JSON.parse(JSON.stringify(form.constr.comps));c[i][k]=v;set('constr.comps',c);};
      return(
        <div className="fu" key={5}>
          <SHead title="Construction Cost" sub="Component-level breakdown with soft costs"/>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
            {form.constr.comps.map((c,ci)=>(
              <div key={c.id} style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
                <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
                  <input style={{...inp({flex:1,padding:'6px 10px',fontSize:12})}} value={c.name} onChange={e=>updateComp(ci,'name',e.target.value)} placeholder="Component name"/>
                  <select value={c.type} onChange={e=>updateComp(ci,'type',e.target.value)} style={{...inp({width:'auto',padding:'6px 8px',fontSize:11})}}>
                    <option value="commercial">Commercial</option><option value="residential">Residential</option><option value="basement">Basement</option><option value="stilt">Stilt/Parking</option><option value="common">Common Area</option>
                  </select>
                  {form.constr.comps.length>1&&<button className="rmbtn" onClick={()=>set('constr.comps',form.constr.comps.filter((_,i)=>i!==ci))} style={{background:'none',border:'none',color:C.red,fontSize:14,opacity:.4,transition:'opacity .15s'}}>✕</button>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <div><label style={lbl}>Area (sqft)</label><input style={inp()} type="number" value={c.area} onChange={e=>updateComp(ci,'area',e.target.value)} placeholder="sqft"/></div>
                  <div><label style={lbl}>Rate (₹/sqft)</label><input style={inp()} type="number" value={c.rate} onChange={e=>updateComp(ci,'rate',e.target.value)} placeholder="₹/sqft"/></div>
                </div>
                {c.area&&c.rate&&<div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginTop:6}}>{fmtINR((+c.area||0)*(+c.rate||0))} {crLabel((+c.area||0)*(+c.rate||0))}</div>}
              </div>
            ))}
          </div>
          <button onClick={()=>set('constr.comps',[...form.constr.comps,{id:Date.now(),name:'',area:'',rate:'',type:'commercial'}])} style={{background:'none',border:`1px dashed ${C.goldDim}`,borderRadius:8,color:C.gold,padding:'9px',fontFamily:font.mono,fontSize:11,width:'100%',marginBottom:16}}>+ Add Component</button>
          <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px'}}>
            <div style={{fontFamily:font.ui,fontSize:10,color:C.gold,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600,marginBottom:12}}>Additional Cost Lines</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div>
                <label style={lbl}>Soft Costs</label>
                <div style={{display:'flex',gap:6}}>
                  <div style={{display:'flex',background:C.dim,borderRadius:6,padding:2,marginRight:4}}>
                    {[{k:'pct',l:'%'},{k:'fixed',l:'₹'}].map(o=><button key={o.k} onClick={()=>set('constr.softType',o.k)} style={{background:form.constr.softType===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:form.constr.softType===o.k?C.gold:C.muted,padding:'5px 8px',fontFamily:font.mono,fontSize:10,cursor:'pointer'}}>{o.l}</button>)}
                  </div>
                  <input style={inp({flex:1})} type="number" value={form.constr.softVal} onChange={e=>set('constr.softVal',e.target.value)} placeholder="0 if none"/>
                </div>
              </div>
              <div><label style={lbl}>Contingency (%)</label><input style={inp()} type="number" value={form.constr.contingency} onChange={e=>set('constr.contingency',e.target.value)} placeholder="0 if none"/></div>
            </div>
            <div><label style={lbl}>Marketing / Sales Brokerage (% of revenue)</label><input style={inp()} type="number" value={form.constr.marketing} onChange={e=>set('constr.marketing',e.target.value)} placeholder="0 if none"/></div>
          </div>
          {tConstr>0&&<TotalBar label="Total Construction Cost" value={tConstr} sub={`Base ${fmtINR(baseConstr)} + Soft ${fmtINR(softAmt)} + Contingency ${fmtINR(contAmt)}`}/>}
          <Notes value={form.constr.notes} onChange={v=>set('constr.notes',v)}/>
        </div>
      );
    }

    if(step===6)return(
      <div className="fu" key={6}>
        <SHead title="Interest" sub="Rates, tenure and method"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div><label style={lbl}>Construction Rate (% p.a.)</label><input style={inp()} type="number" step="0.5" value={form.interest.cRate} onChange={e=>set('interest.cRate',e.target.value)}/></div>
          <div><label style={lbl}>Construction Tenure (yrs)</label><input style={inp()} type="number" step="0.5" value={form.interest.cTenure} onChange={e=>set('interest.cTenure',e.target.value)}/></div>
          <div><label style={lbl}>Land Rate (% p.a.)</label><input style={inp()} type="number" step="0.5" value={form.interest.lRate} onChange={e=>set('interest.lRate',e.target.value)}/></div>
          <div><label style={lbl}>Land Tenure (yrs)</label><input style={inp()} type="number" step="0.5" value={form.interest.lTenure} onChange={e=>set('interest.lTenure',e.target.value)}/></div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={lbl}>Interest Method</label>
          <div style={{display:'flex',background:C.dim,borderRadius:7,padding:3}}>
            {[{k:'simple',l:'Simple Interest'},{k:'compound',l:'Compound Interest'}].map(o=><button key={o.k} onClick={()=>set('interest.method',o.k)} style={{flex:1,background:form.interest.method===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:form.interest.method===o.k?C.gold:C.muted,padding:'8px',fontFamily:font.mono,fontSize:11,cursor:'pointer'}}>{o.l}</button>)}
          </div>
        </div>
        <div onClick={()=>set('interest.presale',!form.interest.presale)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',border:`1px solid ${form.interest.presale?C.gold:C.border}`,borderRadius:8,cursor:'pointer',background:form.interest.presale?'rgba(201,168,76,0.06)':'transparent'}}>
          <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${form.interest.presale?C.gold:C.border}`,background:form.interest.presale?C.gold:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.bg,flexShrink:0}}>{form.interest.presale&&'✓'}</div>
          <div><div style={{fontFamily:font.ui,fontSize:12,color:form.interest.presale?C.gold:C.text,fontWeight:500}}>Apply Pre-sale Offset</div><div style={{fontFamily:font.mono,fontSize:9,color:C.muted}}>⭐ Priority unit inflows reduce the construction interest base</div></div>
        </div>
        <Notes value={form.interest.notes} onChange={v=>set('interest.notes',v)}/>
      </div>
    );

    if(step===7)return(
      <div className="fu" key={7}>
        <SHead title="Sale Rates & Exits" sub="Rate mode and scenarios to model"/>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Rate Input Mode</label>
          <div style={{display:'flex',background:C.dim,borderRadius:7,padding:3,marginBottom:form.rateMode==='global'?12:0}}>
            {[{k:'global',l:'Global Rates'},{k:'perUnit',l:'Per Floor / Unit (from Section 3)'}].map(o=><button key={o.k} onClick={()=>set('rateMode',o.k)} style={{flex:1,background:form.rateMode===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:form.rateMode===o.k?C.gold:C.muted,padding:'8px',fontFamily:font.mono,fontSize:10,cursor:'pointer'}}>{o.l}</button>)}
          </div>
          {form.rateMode==='perUnit'&&<div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:9,padding:'12px 14px',marginTop:10}}>
            <div style={{fontFamily:font.mono,fontSize:10,color:C.muted,marginBottom:8}}>Auto-pulled from Section 3:</div>
            {form.floors.map((f,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:i<form.floors.length-1?`1px solid ${C.border}`:undefined}}>
                <span style={{fontFamily:font.ui,fontSize:11,color:C.text}}>{f.label} ({f.floorNo})</span>
                <span style={{fontFamily:font.mono,fontSize:10,color:C.muted}}>{f.rateType==='rental'?`₹${f.rentalRate}/sqft/mo rental`:`₹${Number(f.saleRate).toLocaleString('en-IN')}/sqft SBA`}</span>
              </div>
            ))}
            <div style={{fontFamily:font.mono,fontSize:9,color:C.goldDim,marginTop:8}}>✏️ To edit → go back to Section 3</div>
          </div>}
        </div>
        {form.rateMode==='global'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div><label style={lbl}>Premium Rate (₹/sqft SBA)</label><input style={inp()} type="number" value={form.rates.premium} onChange={e=>set('rates.premium',e.target.value)} placeholder="e.g. 20000"/></div>
          <div>
            <label style={lbl}>Monthly Rental (₹/sqft/mo)</label>
            <input style={inp()} type="number" value={form.rates.rental} onChange={e=>set('rates.rental',e.target.value)} placeholder="e.g. 70"/>
            {form.rates.rental>0&&<div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginTop:4}}>Cap value (×{form.rates.cap}) = ₹{(form.rates.rental*form.rates.cap).toLocaleString('en-IN')}/sqft</div>}
          </div>
          <div><label style={lbl}>Cap Multiplier</label><input style={inp()} type="number" value={form.rates.cap} onChange={e=>set('rates.cap',e.target.value)}/></div>
        </div>}
        <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px',marginBottom:12}}>
          <div style={{fontFamily:font.ui,fontSize:10,color:C.gold,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600,marginBottom:12}}>Exit Scenarios</div>
          {[
            {k:'during',l:'⚡ Sell During Construction',d:'= Base sale price · No interest applied'},
            {k:'premium',l:'🏆 Outright Sale @ Premium',d:'Single buyer · Full interest · Premium rate'},
            {k:'leaseUnit',l:'🏢 Lease — Per Floor / Unit',d:'Each floor/unit at its own rental rate'},
            {k:'leaseSingle',l:'🏢 Lease — Single Tenant',d:'Whole project to one tenant at one rate'},
          ].map(o=>(
            <div key={o.k} onClick={()=>set(`exits.${o.k}`,!form.exits[o.k])} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',border:`1px solid ${form.exits[o.k]?C.gold:C.border}`,borderRadius:8,cursor:'pointer',background:form.exits[o.k]?'rgba(201,168,76,0.05)':'transparent',marginBottom:8,transition:'all .15s'}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${form.exits[o.k]?C.gold:C.border}`,background:form.exits[o.k]?C.gold:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.bg,flexShrink:0}}>{form.exits[o.k]&&'✓'}</div>
              <div><div style={{fontFamily:font.ui,fontSize:12,color:form.exits[o.k]?C.gold:C.text,fontWeight:500}}>{o.l}</div><div style={{fontFamily:font.mono,fontSize:9,color:C.muted}}>{o.d}</div></div>
            </div>
          ))}
          {form.exits.leaseSingle&&<div style={{marginTop:4,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div><label style={lbl}>Single Tenant Rate</label><input style={inp()} type="number" value={form.rates.stRate} onChange={e=>set('rates.stRate',e.target.value)} placeholder="Rate"/></div>
            <div><label style={lbl}>Rate Type</label><div style={{display:'flex',background:C.dim,borderRadius:6,padding:2}}>{[{k:'perSqft',l:'₹/sqft/mo'},{k:'totalMonthly',l:'₹ Total/mo'}].map(o=><button key={o.k} onClick={()=>set('rates.stType',o.k)} style={{flex:1,background:form.rates.stType===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:form.rates.stType===o.k?C.gold:C.muted,padding:'6px 4px',fontFamily:font.mono,fontSize:9,cursor:'pointer'}}>{o.l}</button>)}</div></div>
          </div>}
        </div>
        <Notes value={form.rates.notes} onChange={v=>set('rates.notes',v)}/>
      </div>
    );

    if(step===8)return(
      <div className="fu" key={8}>
        <SHead title="Deal Split" sub="Investor structure and revenue share"/>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Deal Structure</label>
          {[{k:'investorBuysLand',l:'Investor Buys Land',d:'Investor deploys land capital · Developer builds · Land interest = investor cost'},{k:'jda',l:'JDA',d:'Landowner contributes land (no cash) · Developer bears construction'},{k:'pureEquity',l:'Pure Equity',d:'Investor funds construction · Developer manages · Revenue split on gross'}].map(o=>(
            <div key={o.k} className="chvr" onClick={()=>set('deal.structure',o.k)} style={{border:`1.5px solid ${form.deal.structure===o.k?C.gold:C.border}`,borderRadius:9,padding:'12px 14px',marginBottom:8,cursor:'pointer',background:form.deal.structure===o.k?'rgba(201,168,76,0.06)':'transparent',transition:'all .15s'}}>
              <div style={{fontFamily:font.ui,fontSize:13,color:form.deal.structure===o.k?C.gold:C.text,fontWeight:600}}>{o.l}</div>
              <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,marginTop:3}}>{o.d}</div>
            </div>
          ))}
        </div>
        {form.deal.structure==='pureEquity'&&<div style={{marginBottom:14}}>
          <label style={lbl}>Who is the equity investor?</label>
          <div style={{display:'flex',background:C.dim,borderRadius:7,padding:3}}>
            {[{k:'external',l:'External Investor'},{k:'internal',l:'My Company / Internal'}].map(o=><button key={o.k} onClick={()=>set('deal.equityType',o.k)} style={{flex:1,background:form.deal.equityType===o.k?C.surface:'transparent',border:'none',borderRadius:5,color:form.deal.equityType===o.k?C.gold:C.muted,padding:'8px',fontFamily:font.mono,fontSize:11,cursor:'pointer'}}>{o.l}</button>)}
          </div>
          {form.deal.equityType==='internal'&&<div style={{marginTop:8,padding:'10px 12px',background:'rgba(74,158,110,0.08)',border:`1px solid ${C.green}`,borderRadius:7,fontFamily:font.mono,fontSize:10,color:C.green}}>Self-funded → model treated as Outright Purchase · No split sheet generated</div>}
        </div>}
        {(form.deal.structure!=='pureEquity'||form.deal.equityType==='external')&&<div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <div style={{fontFamily:font.ui,fontSize:11,color:C.text,fontWeight:600}}>🏦 Investor: {form.deal.invPct}%</div>
            <div style={{fontFamily:font.ui,fontSize:11,color:C.text,fontWeight:600}}>🏗️ Developer: {100-form.deal.invPct}%</div>
          </div>
          <input type="range" min={30} max={80} step={5} value={form.deal.invPct} onChange={e=>set('deal.invPct',+e.target.value)} style={{width:'100%',marginBottom:10}}/>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            {[50,55,60,70].map(v=><button key={v} onClick={()=>set('deal.invPct',v)} style={{flex:1,background:form.deal.invPct===v?'rgba(201,168,76,0.12)':'none',border:`1px solid ${form.deal.invPct===v?C.gold:C.border}`,borderRadius:6,color:form.deal.invPct===v?C.gold:C.muted,padding:'6px',fontFamily:font.mono,fontSize:10}}>{v}/{100-v}</button>)}
          </div>
          <div><label style={lbl}>Investor Name (optional)</label><input style={inp()} value={form.deal.invName} onChange={e=>set('deal.invName',e.target.value)} placeholder="e.g. ABC Investments"/></div>
        </div>}
        <Notes value={form.deal.notes} onChange={v=>set('deal.notes',v)}/>
      </div>
    );

    if(step===9){
      const checks=[
        {ok:!!form.projectName,msg:'Project name'},
        {ok:!!form.location,msg:'Location'},
        {ok:form.floors.length>0&&form.floors.some(f=>+f.carpet>0),msg:'Floor schedule with carpet areas'},
        {ok:!!form.land.acq||form.land.owned,msg:'Land acquisition cost'},
        {ok:form.constr.comps.some(c=>+c.area>0&&+c.rate>0),msg:'Construction cost components'},
        {ok:form.mode==='outright'||form.deal.invPct>0,msg:'Deal split'},
        {ok:form.exits.during||form.exits.premium||form.exits.leaseUnit||form.exits.leaseSingle,msg:'At least one exit selected'},
      ];
      const ok=checks.filter(c=>c.ok).length;
      const allOk=checks.every(c=>c.ok);
      return(
        <div className="fu" key={9}>
          <SHead title="Review & Generate" sub="Check summary then generate your input prompt"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>📍 Project</div>
              <div style={{fontFamily:font.display,fontSize:16,color:C.text}}>{form.projectName||'—'}</div>
              <div style={{fontFamily:font.mono,fontSize:10,color:C.muted,marginTop:2}}>{form.location} · {form.mode}</div>
            </div>
            <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>🏗️ Floor Schedule</div>
              <div style={{fontFamily:font.display,fontSize:16,color:C.text}}>{form.floors.length} floors</div>
              <div style={{fontFamily:font.mono,fontSize:10,color:C.muted,marginTop:2}}>Total SBA: {Math.round(tSBA).toLocaleString('en-IN')} sqft</div>
            </div>
            <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>💰 Cost Stack</div>
              <div style={{fontFamily:font.mono,fontSize:10,color:C.text}}>Land: {crLabel(tLand)||fmtINR(tLand)}</div>
              <div style={{fontFamily:font.mono,fontSize:10,color:C.muted}}>Build: {crLabel(tConstr)||fmtINR(tConstr)}</div>
            </div>
            <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>🚪 Exits</div>
              {form.exits.during&&<div style={{fontFamily:font.mono,fontSize:9,color:C.text}}>⚡ During Construction</div>}
              {form.exits.premium&&<div style={{fontFamily:font.mono,fontSize:9,color:C.text}}>🏆 Outright Premium</div>}
              {form.exits.leaseUnit&&<div style={{fontFamily:font.mono,fontSize:9,color:C.text}}>🏢 Lease per Unit</div>}
              {form.exits.leaseSingle&&<div style={{fontFamily:font.mono,fontSize:9,color:C.text}}>🏢 Single Tenant</div>}
            </div>
          </div>
          <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px',marginBottom:16}}>
            <div style={{fontFamily:font.ui,fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600,marginBottom:10}}>Checklist — {ok}/{checks.length}</div>
            {checks.map((c,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                <div style={{width:14,height:14,borderRadius:3,background:c.ok?'rgba(74,158,110,0.15)':'rgba(224,85,85,0.12)',border:`1px solid ${c.ok?C.green:C.red}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:c.ok?C.green:C.red,flexShrink:0}}>{c.ok?'✓':'!'}</div>
                <div style={{fontFamily:font.mono,fontSize:10,color:c.ok?C.muted:C.text}}>{c.msg}</div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}><label style={lbl}>Additional Notes (optional)</label><textarea value={form.reviewNotes} onChange={e=>set('reviewNotes',e.target.value)} style={{...inp({fontSize:12,padding:'10px 12px',resize:'vertical',minHeight:60}),width:'100%'}} placeholder="Any final one-off instructions…"/></div>
          <button onClick={generate} style={{width:'100%',background:allOk?`rgba(201,168,76,0.12)`:'rgba(201,168,76,0.04)',border:`1px solid ${allOk?C.gold:C.goldDim}`,borderRadius:10,color:allOk?C.gold:C.goldDim,padding:'16px',fontFamily:font.display,fontSize:22,fontWeight:500,letterSpacing:'-0.01em',transition:'all .2s'}}>
            {allOk?'⬛ Generate Input Summary →':'Complete checklist to generate'}
          </button>
        </div>
      );
    }
    return null;
  };

  return(
    <div style={{background:C.bg,minHeight:'100vh',color:C.text}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:20}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{background:'white',borderRadius:7,padding:'3px 6px',display:'flex',alignItems:'center',height:34}}>
            <img src={`data:image/jpeg;base64,${LOGO_B64}`} alt="Amol Developers" style={{height:28,width:'auto',display:'block'}}/>
          </div>
          <div style={{width:1,height:24,background:C.border}}/>
          <div>
            <div style={{fontFamily:font.display,fontSize:13,color:C.text,lineHeight:1.1,fontWeight:500}}>Property Working</div>
            <div style={{fontFamily:font.mono,fontSize:8,color:C.muted,letterSpacing:'0.16em',textTransform:'uppercase'}}>Feasibility Builder</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {form.mode&&step>0&&<div style={{background:C.dim,borderRadius:5,padding:'3px 9px',fontFamily:font.ui,fontSize:9,color:C.muted,letterSpacing:'0.08em',textTransform:'uppercase'}}>{form.mode==='development'?'Dev Deal':form.mode==='outright'?'Outright':'Both'}</div>}
          {step>0&&<div style={{fontFamily:font.mono,fontSize:10,color:C.dim}}>{dIdx}/{visSteps.filter(s=>s<9).length}</div>}
        </div>
      </div>
      {step>0&&<div style={{height:2,background:C.border}}><div style={{height:'100%',width:`${(dIdx/visSteps.filter(s=>s<9).length)*100}%`,background:`linear-gradient(90deg,${C.goldDim},${C.gold})`,transition:'width .4s cubic-bezier(.4,0,.2,1)'}}/></div>}
      {step>0&&step<9&&<div style={{overflowX:'auto',padding:'10px 20px 0',display:'flex',gap:4,scrollbarWidth:'none'}}>
        {visL.map((label,i)=>(
          <div key={label} style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            <div style={{width:19,height:19,borderRadius:'50%',border:`1.5px solid ${i<dIdx?C.goldDim:i===dIdx?C.gold:C.border}`,background:i<dIdx?'rgba(122,98,40,0.3)':i===dIdx?'rgba(201,168,76,0.15)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:font.mono,fontSize:8,color:i<=dIdx?C.gold:C.dim}}>{i<dIdx?'✓':i+1}</div>
            <span style={{fontFamily:font.ui,fontSize:8,color:i===dIdx?C.text:C.dim,fontWeight:i===dIdx?600:400,letterSpacing:'0.04em'}}>{label}</span>
            {i<visL.length-1&&<span style={{color:C.dim,fontSize:10,marginLeft:2}}>›</span>}
          </div>
        ))}
      </div>}
      <div style={{maxWidth:560,margin:'0 auto',padding:step===0?'0':'24px 20px 100px'}}>
        {stepRender()}
      </div>
      {step>0&&<div style={{position:'fixed',bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,padding:'12px 20px',display:'flex',gap:10,zIndex:20}}>
        <button onClick={goPrev} style={{flex:1,background:'none',border:`1px solid ${C.border}`,borderRadius:9,color:C.muted,padding:'12px',fontFamily:font.mono,fontSize:12,transition:'all .2s'}}>← Back</button>
        {step<9&&<button onClick={goNext} style={{flex:2.5,background:C.elevated,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,padding:'12px 24px',fontFamily:font.display,fontSize:18,fontWeight:500,letterSpacing:'-0.01em',transition:'all .2s'}}>Continue →</button>}
      </div>}
      {modal&&<PromptModal prompt={prompt} onClose={()=>setModal(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
