  *{box-sizing:border-box;margin:0;padding:0;}

  #root{min-height:100%;}
  input,select,textarea{font-family:'DM Mono',monospace;}
  input[type=number]::-webkit-inner-spin-button{opacity:.15;}
  input::placeholder{color:#252C40;}
  input:focus,textarea:focus{outline:none;border-color:#7A6228!important;}
  button{cursor:pointer;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#1C2133;border-radius:3px;}

  .fu{animation:fu .3s cubic-bezier(.4,0,.2,1) both;}
  @keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .chvr:hover{border-color:#7A6228!important;background:rgba(201,168,76,0.04)!important;}
  .genbtn:hover{box-shadow:0 8px 40px rgba(201,168,76,.45)!important;transform:translateY(-2px);}
  .rmbtn:hover{opacity:1!important;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
  .modal-box{background:#0F1219;border:1px solid #C9A84C;border-radius:14px;width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
  textarea.prompt-box{background:#07080D;border:none;color:#A0A8C0;font-family:'DM Mono',monospace;font-size:11px;line-height:1.7;padding:20px;flex:1;resize:none;min-height:260px;}

const C = {
  bg:'#07080D',surface:'#0F1219',elevated:'#151923',border:'#1C2133',
  gold:'#C9A84C',goldLight:'#E0BA6A',goldDim:'#7A6228',
  text:'#EDE8DC',muted:'#626880',dim:'#252C40',input:'#0B0D14',red:'#E05555',
};
const font={display:"'Cormorant Garamond',serif",mono:"'DM Mono',monospace",ui:"'Syne',sans-serif"};

const fmtINR=(n)=>{const num=parseFloat(n);if(!n||isNaN(num)||num===0)return'—';return'₹ '+num.toLocaleString('en-IN',{maximumFractionDigits:0});};
const crLabel=(n)=>{const num=parseFloat(n);if(!n||isNaN(num)||num===0)return'';if(num>=10000000)return`${(num/10000000).toFixed(2)} Cr`;if(num>=100000)return`${(num/100000).toFixed(2)} L`;return'';};
const inp=(extra={})=>({background:C.input,border:`1px solid ${C.border}`,borderRadius:7,color:C.text,padding:'11px 14px',width:'100%',fontFamily:font.mono,fontSize:13,transition:'border-color 0.2s',...extra});
const lbl={display:'block',color:C.muted,fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',fontFamily:font.ui,fontWeight:600,marginBottom:7};

function SHead({title,sub}){return(<div style={{marginBottom:28}}><div style={{fontFamily:font.display,fontSize:28,fontWeight:500,color:C.text,letterSpacing:'-0.01em',lineHeight:1.1}}>{title}</div>{sub&&<div style={{fontFamily:font.mono,fontSize:11,color:C.muted,marginTop:6}}>{sub}</div>}</div>);}
function TotalBar({label,value}){return(<div style={{background:`rgba(201,168,76,0.06)`,border:`1px solid ${C.gold}`,borderRadius:10,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14}}><div><div style={{fontFamily:font.ui,fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600}}>{label}</div><div style={{fontFamily:font.display,fontSize:26,color:C.gold,marginTop:3}}>{fmtINR(value)}</div></div>{crLabel(value)&&<div style={{fontFamily:font.mono,fontSize:13,color:C.goldDim}}>{crLabel(value)}</div>}</div>);}

function PromptModal({prompt,onClose}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard.writeText(prompt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});};
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box">
        <div style={{padding:'20px 22px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:font.display,fontSize:20,color:C.text,fontWeight:500}}>Workbook Prompt Ready</div>
            <div style={{fontFamily:font.mono,fontSize:10,color:C.muted,marginTop:3}}>Copy · Paste into Claude · Workbook generates automatically</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,padding:'6px 12px',fontFamily:font.mono,fontSize:11}}>✕ Close</button>
        </div>
        <textarea className="prompt-box" readOnly value={prompt}/>
        <div style={{padding:'14px 22px',borderTop:`1px solid ${C.border}`,display:'flex',gap:12}}>
          <button onClick={copy} style={{flex:1,background:copied?`rgba(74,158,110,0.15)`:`rgba(201,168,76,0.12)`,border:`1px solid ${copied?'#4A9E6E':C.gold}`,borderRadius:9,padding:'13px',fontFamily:font.display,fontSize:18,fontWeight:500,color:copied?'#4A9E6E':C.gold,transition:'all .2s'}}>
            {copied?'✓ Copied to Clipboard':'Copy Prompt'}
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [step,setStep]=useState(0);
  const [showModal,setShowModal]=useState(false);
  const [generatedPrompt,setGeneratedPrompt]=useState('');
  const [form,setForm]=useState({
    mode:'',projectName:'',location:'Hyderabad',loadingFactor:1.40,
    floors:[{label:'Ground Floor',carpetArea:'',rateType:'sale',saleRate:'',rentalRate:''},{label:'First Floor',carpetArea:'',rateType:'sale',saleRate:'',rentalRate:''}],
    land:{acquisition:'',stampDuty:'',brokerage:''},
    construction:[{name:'Residential Floors',area:'',rate:'',autoArea:true},{name:'Cellar / Basement',area:'',rate:'',autoArea:false}],
    interest:{constructionRate:12,constructionTenure:1,landRate:12,landTenure:2},
    saleRates:{premium:'',base:'',rental:''},
    investorShare:55,
    exits:{duringConstruction:true,outrightPremium:true,outrightBase:true,floorByFloor:false,leaseRental:false},
  });

  const set=(path,value)=>{setForm(prev=>{const next=JSON.parse(JSON.stringify(prev));const keys=path.split('.');let obj=next;for(let i=0;i<keys.length-1;i++)obj=obj[keys[i]];obj[keys[keys.length-1]]=value;return next;});};
  const MAX=8;
  const goNext=()=>{let n=step+1;if(n===7&&form.mode==='outright')n=8;setStep(n);};
  const goPrev=()=>{let p=step-1;if(p===7&&form.mode==='outright')p=6;setStep(p);};

  const tLand=(+form.land.acquisition||0)+(+form.land.stampDuty||0)+(+form.land.brokerage||0);
  const tCarpet=form.floors.reduce((s,f)=>s+(+f.carpetArea||0),0);

            ))}
          </div>
          <button className="genbtn" onClick={handleGenerate}
            style={{width:'100%',padding:'17px 24px',background:`linear-gradient(135deg,#B8942A 0%,#E8C97A 45%,#C9A84C 100%)`,border:'none',borderRadius:11,fontFamily:font.display,fontSize:22,fontWeight:600,color:C.bg,letterSpacing:'-0.01em',boxShadow:'0 6px 32px rgba(201,168,76,0.22)',transition:'all .25s',cursor:'pointer'}}>
            Generate Prompt →
          </button>
          <div style={{fontFamily:font.mono,fontSize:10,color:C.dim,textAlign:'center',marginTop:10}}>Copies a structured prompt · Paste into Claude to build the Excel workbook</div>
        </div>
      );
    },
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg,paddingBottom:step>0?82:0}}>

      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'12px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:20}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{background:'white',borderRadius:8,padding:'4px 8px',display:'flex',alignItems:'center',justifyContent:'center',height:40}}>
            <img src={`data:image/jpeg;base64,${LOGO_B64}`} alt="Amol Developers" style={{height:32,width:'auto',display:'block'}}/>
          </div>
          <div style={{width:1,height:28,background:C.border}}/>
          <div>
            <div style={{fontFamily:font.display,fontSize:14,color:C.text,lineHeight:1.1,fontWeight:500}}>Property Working</div>
            <div style={{fontFamily:font.mono,fontSize:9,color:C.muted,letterSpacing:'0.16em',textTransform:'uppercase'}}>Feasibility Builder</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {form.mode&&step>0&&<div style={{background:C.dim,borderRadius:5,padding:'3px 9px',fontFamily:font.ui,fontSize:9,color:C.muted,letterSpacing:'0.08em',textTransform:'uppercase'}}>{{development:'Dev Deal',outright:'Outright',both:'Both'}[form.mode]}</div>}
          {step>0&&<div style={{fontFamily:font.mono,fontSize:10,color:C.dim}}>{dIdx}/{dTot}</div>}
        </div>
      </div>

      {/* PROGRESS */}
      {step>0&&<div style={{height:2,background:C.border}}><div style={{height:'100%',width:`${(dIdx/dTot)*100}%`,background:`linear-gradient(90deg,${C.goldDim},${C.gold})`,transition:'width .4s cubic-bezier(.4,0,.2,1)'}}/></div>}

      {/* BREADCRUMB */}
      {step>0&&step<8&&(
        <div style={{overflowX:'auto',padding:'12px 22px 0',display:'flex',gap:5,scrollbarWidth:'none'}}>
          {visLabels.map((label,i)=>(
            <div key={label} style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
              <div style={{width:20,height:20,borderRadius:'50%',border:`1.5px solid ${i<dIdx?C.goldDim:i===dIdx?C.gold:C.border}`,background:i<dIdx?`rgba(122,98,40,0.3)`:i===dIdx?`rgba(201,168,76,0.15)`:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:font.mono,fontSize:9,color:i<=dIdx?C.gold:C.dim}}>{i<dIdx?'✓':i+1}</div>
              <span style={{fontFamily:font.ui,fontSize:9,color:i===dIdx?C.text:C.dim,fontWeight:i===dIdx?600:400,letterSpacing:'0.04em'}}>{label}</span>
              {i<visLabels.length-1&&<span style={{color:C.dim,fontSize:11,marginLeft:2}}>›</span>}
            </div>
          ))}
        </div>
      )}

      {/* CONTENT */}
      <div style={{maxWidth:580,margin:'0 auto',padding:step===0?'40px 22px':'28px 22px 20px'}}>
        {steps[step]&&steps[step]()}
      </div>

      {/* BOTTOM NAV */}
      {step>0&&(
        <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,padding:'13px 22px',display:'flex',gap:12,zIndex:20}}>
          <button onClick={goPrev} style={{flex:1,background:'none',border:`1px solid ${C.border}`,borderRadius:9,color:C.muted,padding:'12px',fontFamily:font.mono,fontSize:12,transition:'all .2s'}}>← Back</button>
          {step<MAX&&<button onClick={goNext} style={{flex:2.5,background:C.elevated,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,padding:'12px 24px',fontFamily:font.display,fontSize:18,fontWeight:500,letterSpacing:'-0.01em',transition:'all .2s'}}>Continue →</button>}
        </div>
      )}

      {/* MODAL */}
      {showModal&&<PromptModal prompt={generatedPrompt} onClose={()=>setShowModal(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
